services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-teraapi}
      MYSQL_DATABASE: ${DB_DATABASE:-teraapi}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-teraapi}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tera-api:
    build: .
    image: tera-api:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
    ports:
      - "80:80"      # Portal API
      - "8040:8040"  # Gateway API
      - "8050:8050"  # Admin Panel
      - "8080:8080"  # Arbiter API (keep internal in production)
    volumes:
      - ./.env:/app/.env:ro
      - ./config:/app/config
      - ./data:/app/data
      - ./public:/app/public
      - ./logs:/app/logs
      - ./sessions:/app/sessions

  db-seed:
    build: .
    image: tera-api:local
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      SEED_ONLY: "1"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    profiles:
      - seed
    volumes:
      - ./.env:/app/.env:ro

volumes:
  mysql_data:
