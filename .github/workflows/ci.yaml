name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The runtime image ships on Node 18, but tests run on Node 20 LTS where the built-in node:test
      # runner is stable. Decoupling the test runtime from the production runtime is intentional.
      # package-lock.json is gitignored in this repo (the Dockerfile uses `npm install`), so we can't use
      # `npm ci` or setup-node's lockfile-based cache here.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund
      - run: npm test

  publish:
    # Gate: never build/push an image unless the test suite passed. Skipped on pull requests (test-only).
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          # Image tag = <UTC-date>-<short-sha>, e.g. 2026.05.06-5ea1069
          # Sortable, uniquely identifies the commit, visibly NOT upstream semver.
          TAG="$(date -u +%Y.%m.%d)-${GITHUB_SHA:0:7}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tera-api
          tags: |
            type=raw,value=${{ steps.vars.outputs.TAG }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
