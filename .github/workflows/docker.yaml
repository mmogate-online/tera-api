name: Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          # Image tag = <UTC-date>-<short-sha>, e.g. 2026.05.06-5ea1069
          # Sortable, uniquely identifies the commit, visibly NOT upstream semver.
          TAG="$(date -u +%Y.%m.%d)-${GITHUB_SHA:0:7}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tera-api
          tags: |
            type=raw,value=${{ steps.vars.outputs.TAG }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
